<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Form</title>
<link rel="stylesheet" href="style.css">
</head>
<body>



<div class="container">
<form id="myForm">

<h2>Register Form</h2>

<div class="form-group">
<label>Name</label>
<input type="text" id="name">
<small class="error"></small>
</div>

<div class="form-group">
<label>Email</label>
<input type="text" id="email">
<small class="error"></small>
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" id="phone">
<small class="error"></small>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password">
<small class="error"></small>
</div>

<div class="form-group">
<label>Stream</label>
<select id="stream">
<option value="">Select Stream</option>
<option>BCA</option>
<option>BBA</option>
<option>B.Tech</option>
<option>BA</option>
</select>
<small class="error"></small>
</div>

<div class="form-group">
<label>Languages</label>

<label class="check">
<input type="checkbox" value="Hindi" class="lang"> Hindi
</label>

<label class="check">
<input type="checkbox" value="English" class="lang"> English
</label>

<small class="error"></small>
</div>

<button type="submit">Submit</button>
<p id="successMsg"></p>

</form>
</div>

<script src="script.js"></script>
</body>
</html>
