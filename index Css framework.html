<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 3 - CSS Framework</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container main-container">

  <h1 class="text-center main-heading">Task 3: CSS Framework UI</h1>

  <div class="row g-4 align-items-stretch">

    <!-- Profile -->
    <div class="col-md-4 d-flex">
      <div class="card w-100">
        <div class="profile-header">
          <h4>Profile</h4>
        </div>
        <div class="card-body text-center d-flex flex-column justify-content-between">
          <div>
            <h5 class="name-bold" id="profileName">Priya Sharma</h5>
            <p>Front-End Developer</p>
          </div>
          <button class="btn profile-btn w-100">View</button>
        </div>
      </div>
    </div>

    <!-- Dashboard -->
    <div class="col-md-4 d-flex">
      <div class="card w-100">
        <div class="dashboard-header">
          <h4>Dashboard</h4>
        </div>
        <div class="card-body d-flex flex-column justify-content-between">
          <div>
            <p>✔ Projects: 5</p>
            <p>✔ Tasks: 12</p>
            <p>✔ Completed: 8</p>
          </div>
          <button class="btn dashboard-btn w-100">Open</button>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div class="col-md-4 d-flex">
      <div class="card w-100">
        <div class="settings-header">
          <h4>Settings</h4>
        </div>
        <div class="card-body d-flex flex-column justify-content-between">
          <div>
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control mb-2" placeholder="Enter name">

            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control mb-3" placeholder="Enter email">
          </div>
          <button class="btn settings-btn w-100">Save</button>
        </div>
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
